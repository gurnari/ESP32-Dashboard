profiles:
  esp32:
    fqbn: esp32:esp32:esp32
    platforms:
      - platform: esp32:esp32 (3.3.7)
        platform_index_url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
    libraries:
      - GxEPD2 (1.6.8)
      - Adafruit GFX Library (1.12.5)
      - Adafruit BusIO (1.17.4)
      - ArduinoJson (7.4.3)
      - PubSubClient (2.8)
    build:
      properties:
        compiler.cpp.extra_flags: -DDEFAULT_PIN_PRESET_ESP32
  esp32_waveshare:
